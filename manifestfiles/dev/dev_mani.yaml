---

apiVersion: v1
kind: Service
metadata:
  name: pipecat-service-dev-headless
  namespace: dev
  labels:
    app: pipecat-service
spec:
  clusterIP: None   # <-- Headless Service
  selector:
    app: pipecat-service
  ports:
    - name: http
      port: 7860
      targetPort: 7860

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pipecat-service-dev
  namespace: dev
  labels:
    app: pipecat-service
spec:
  serviceName: pipecat-service-dev-headless
  replicas: 2
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: pipecat-service
  template:
    metadata:
      labels:
        app: pipecat-service
    spec:
      serviceAccountName: aws-access-s3-role
      initContainers:
        - name: fetch-credentials
          image: amazon/aws-cli:2.15.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Downloading credentials from S3..."
              aws s3 cp s3://ai-agent-credentials/ai-agent-467302-7d9911964de11.json /credentials/app.json
              echo "Done."
          volumeMounts:
            - name: credentials
              mountPath: /credentials
      containers:
        - name: pipecat-service
          image: 891377297853.dkr.ecr.ap-south-1.amazonaws.com/pipecat-service_dev:e0ec162-20260404
          ports:
            - containerPort: 7860
          envFrom:
            - secretRef:
                name: pipecat-service-env
          resources:
            requests:
              cpu: "1.5"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
          volumeMounts:
            - name: data-storage
              mountPath: /app/data
            - name: credentials
              mountPath: /app/credentials
              readOnly: true
      volumes:
        - name: credentials
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data-storage
        labels:
          app: pipecat-service
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ebs-sc
        resources:
          requests:
            storage: 10Gi

---

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: pipecat-service-scaler
  namespace: dev
spec:
  scaleTargetRef:
    kind: StatefulSet
    name: pipecat-service-dev

  minReplicaCount: 2          # match your current baseline
  maxReplicaCount: 10         # set based on cluster capacity
  pollingInterval: 15         # seconds (how often KEDA checks Prometheus)
  cooldownPeriod: 60          # seconds before scaling down

  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
            - type: Pods
              value: 4
              periodSeconds: 30
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
            - type: Pods
              value: 2
              periodSeconds: 60
          selectPolicy: Min

  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
        metricName: pipecat_active_calls_total
        query: sum(vagent_active_calls) or vector(0)
        threshold: "5"
        activationThreshold: "1"
    
    # 2) CPU trigger (same idea as HPA CPU utilization)
    - type: cpu
      metricType: Utilization
      metadata:
        value: "85"     # target CPU utilization %

    # 3) Memory trigger
    - type: memory
      metricType: Utilization
      metadata:
        value: "85"     # target memory utilization %


