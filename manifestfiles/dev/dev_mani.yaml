  name: pipecat-service-dev
  namespace: dev
  labels:
    app: pipecat-service
spec:
  selector:
    app: pipecat-service
  ports:
    - name: http
      protocol: TCP
      port: 7860
      targetPort: 7860
  type: ClusterIP

