---

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: pipecat-service-scaler-sandbox
  namespace: sandbox
spec:
  scaleTargetRef:
    kind: StatefulSet
    name: pipecat-service-sandbox

  minReplicaCount: 2          # match your current baseline
  maxReplicaCount: 10         # set based on cluster capacity
  pollingInterval: 15         # seconds (how often KEDA checks Prometheus)
  cooldownPeriod: 60          # seconds before scaling down

  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
            - type: Pods
              value: 4
              periodSeconds: 30
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
            - type: Pods
              value: 2
              periodSeconds: 60
          selectPolicy: Min

  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-kube-prometheus-prometheus.monitoring.svc:9090
        metricName: pipecat_active_calls_total
        query: sum(vagent_active_calls) or vector(0)
        threshold: "5"
        activationThreshold: "1"
    
    # 2) CPU trigger (same idea as HPA CPU utilization)
    - type: cpu
      metricType: Utilization
      metadata:
        value: "85"     # target CPU utilization %

    # 3) Memory trigger
    - type: memory
      metricType: Utilization
      metadata:
        value: "85"     # target memory utilization %

