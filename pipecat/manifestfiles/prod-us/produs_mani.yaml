---

apiVersion: v1
kind: Service
metadata:
  name: pipecat-service-prod-headless
  namespace: prod-us
  labels:
    app: pipecat-service
spec:
  clusterIP: None   # <-- Headless Service
  selector:
    app: pipecat-service
  ports:
    - name: http
      port: 7860
      targetPort: 7860

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pipecat-service-prod
  namespace: prod-us
  labels:
    app: pipecat-service
spec:
  serviceName: pipecat-service-prod-headless
  replicas: 2
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: pipecat-service
  template:
    metadata:
      labels:
        app: pipecat-service
    spec:
      serviceAccountName: aws-access-s3-role
      initContainers:
        - name: fetch-credentials
          image: amazon/aws-cli:2.15.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Downloading credentials from S3..."
              aws s3 cp s3://ai-agent-credentials/ai-agent-467302-7d9911964de11.json /credentials/app.json
              echo "Done."
          volumeMounts:
            - name: credentials
              mountPath: /credentials
      containers:
        - name: pipecat-service
          image: 891377297853.dkr.ecr.us-west-2.amazonaws.com/pipecat-service-prod-us:<IMAGE_TAG>
          ports:
            - containerPort: 7860
          envFrom:
            - secretRef:
                name: pipecat-service-env
          resources:
            requests:
              cpu: "1.5"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: data-storage
              mountPath: /app/data
            - name: credentials
              mountPath: /app/credentials
              readOnly: true
      volumes:
        - name: credentials
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data-storage
        labels:
          app: pipecat-service
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: ebs-sc
        resources:
          requests:
            storage: 10Gi

---

# Keep your regular ClusterIP service for app traffic
apiVersion: v1
kind: Service
metadata:
  name: pipecat-service-prod
  namespace: prod-us
  labels:
    app: pipecat-service
spec:
  selector:
    app: pipecat-service
  ports:
    - name: http
      protocol: TCP
      port: 7860
      targetPort: 7860
  type: ClusterIP

