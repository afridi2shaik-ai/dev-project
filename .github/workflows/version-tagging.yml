name: version-tagging

on:
  pull_request:
    branches:
      - dev
      - sandbox-us
      - main
    types:
      - closed
      
jobs:
  build:
    # ONLY act if the PR was actually merged, ignore closed-but-discarded PRs
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest   # Change to eks_runner if you use self-hosted runners
    permissions:
      contents: write
      issues: write
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment variables
        run: |
          echo "PR_TARGET=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV
          echo "PR_SOURCE=${{ github.event.pull_request.head.ref }}" >> $GITHUB_ENV
          echo "PR_LABELS=${{ join(github.event.pull_request.labels.*.name, ' ') }}" >> $GITHUB_ENV
          git rev-parse --short HEAD > commit_id.txt
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Determine & Bump Version
        run: |
          # 1. Clone the metadata repository
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/afridi2shaik-ai/meta-data.git meta-repo-version
          cd meta-repo-version
          
          # 2. Checkout the release branch which holds version.json
          git checkout release || echo "Branch 'release' not found, will create files locally."
          
          # 3. Create initial file if missing
          if [ ! -f "version.json" ]; then
            echo '{"main":{"version":"1.0.0"},"sandbox-us":{"version":"1.1.0_rc0"}}' > version.json
          fi
          
          MAIN_VER=$(jq -r '.main.version // "1.0.0"' version.json | sed 's/^v//')
          STAGING_VER=$(jq -r '."sandbox-us".version // "1.1.0_rc0"' version.json | sed 's/^v//')
          
          IFS='.' read -r major minor patch <<< "$MAIN_VER"
          UPDATE_VERSION_JSON=false
          
          if [ "$PR_TARGET" == "main" ]; then
            # Evaluate rules for Master/Main versioning
            if echo "$PR_LABELS" | grep -iE "major|breaking"; then
              echo "Major hit detected via PR labels!"
              major=$((major + 1))
              minor=0
              patch=0
            elif [ "$PR_SOURCE" == "sandbox-us" ] || [[ "$PR_SOURCE" == *"staging"* ]]; then
              echo "Staging merged into Master -> Incrementing MINOR version."
              minor=$((minor + 1))
              patch=0
            else
              echo "Hotfix/Other merge into Master -> Incrementing PATCH version."
              patch=$((patch + 1))
            fi
            
            NEW_VERSION="${major}.${minor}.${patch}"
            jq --arg v "$NEW_VERSION" '.main.version = $v' version.json > tmp.json && mv tmp.json version.json
            RELEASE_TAG="v$NEW_VERSION"
            UPDATE_VERSION_JSON=true
            
          elif [ "$PR_TARGET" == "sandbox-us" ]; then
            # Evaluate rules for Staging (RC versions tracking ahead of the next minor release)
            NEXT_MINOR=$((minor + 1))
            EXPECTED_STAGING_BASE="${major}.${NEXT_MINOR}.0"
            
            CURRENT_STAGING_BASE=$(echo "$STAGING_VER" | cut -d'_' -f1)
            CURRENT_RC=$(echo "$STAGING_VER" | grep -o 'rc[0-9]*' | sed 's/rc//' 2>/dev/null || echo "0")
            if [ -z "$CURRENT_RC" ]; then CURRENT_RC=0; fi
            
            if [ "$CURRENT_STAGING_BASE" == "$EXPECTED_STAGING_BASE" ]; then
              # Already tracking the correct minor cycle, bump the release candidate number
              NEW_RC=$((CURRENT_RC + 1))
            else
              # Master bumped, start a new RC cycle
              NEW_RC=1
            fi
            
            NEW_VERSION="${EXPECTED_STAGING_BASE}_rc${NEW_RC}"
            jq --arg v "$NEW_VERSION" '."sandbox-us".version = $v' version.json > tmp.json && mv tmp.json version.json
            RELEASE_TAG="v$NEW_VERSION"
            UPDATE_VERSION_JSON=true
            
          elif [ "$PR_TARGET" == "dev" ]; then
            # Dev branch - internal build number, no formal semantic version push to JSON
            RELEASE_TAG="dev-${COMMIT_ID}"
          fi
          
          echo "==== FINAL COMPUTED RELEASE_TAG: $RELEASE_TAG ===="
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          
          # 4. Save back to the release branch
          if [ "$UPDATE_VERSION_JSON" = true ]; then
            git config --global user.name "github-actions"
            git config --global user.email "github-actions@github.com"
            git add version.json
            git commit -m "chore: bump version to $RELEASE_TAG [skip ci]" || true
            git push origin release || true
          fi

      - name: Create GitHub Release
        if: env.PR_TARGET != 'dev'
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" --repo="$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists."
          else
            gh release create "$RELEASE_TAG" \
              --repo="$GITHUB_REPOSITORY" \
              --title="Release $RELEASE_TAG" \
              --generate-notes \
              --target "${{ github.event.pull_request.merge_commit_sha || github.sha }}"
            # Brief sleep to allow GitHub API context to fully register the release
            sleep 3
          fi
          
      - name: Extract Release Notes
        if: env.PR_TARGET != 'dev'
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          RELEASE_URL=$(gh release view "$RELEASE_TAG" --repo="$GITHUB_REPOSITORY" --json url -q '.url' || echo "N/A")
          gh release view "$RELEASE_TAG" --repo="$GITHUB_REPOSITORY" --json body -q '.body' > release_notes.md || echo "No notes found" > release_notes.md
          echo "Release URL: $RELEASE_URL" > release_info.md
          echo "Commit ID: $COMMIT_ID" >> release_info.md
          echo "Build Number: ${{ github.run_number }}" > meta_file.json

      - name: Store versioning event in meta-repo env-branch
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Clone it afresh to checkout the specific target environment branch
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/afridi2shaik-ai/meta-data.git meta-repo-artifacts
          cd meta-repo-artifacts
          
          # Checkout the tracking branch (dev, sandbox-us, main)
          git checkout $PR_TARGET || git checkout -b $PR_TARGET
          
          mkdir -p event-management/$RELEASE_TAG
          
          if [ "$PR_TARGET" != "dev" ]; then
            cp ../meta_file.json event-management/$RELEASE_TAG/
            cp ../release_notes.md event-management/$RELEASE_TAG/
            cp ../release_info.md event-management/$RELEASE_TAG/
          else
            cp ../commit_id.txt event-management/$RELEASE_TAG/
          fi
          
          git add .
          git commit -m "chore: store release artifacts for $RELEASE_TAG [skip ci]" || echo "No changes to commit"
          git push origin $PR_TARGET || echo "Failed to push release artifacts to $PR_TARGET branch"
