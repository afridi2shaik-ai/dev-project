name: version-tagging

on:
  pull_request:
    branches:
      - dev
      - sandbox-us
      - main
    types:
      - closed

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get current branch name
        run: echo "BRANCH_NAME=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Get Commit ID
        run: |
          COMMIT_ID=$(git rev-parse --short HEAD)
          echo "COMMIT_ID=$COMMIT_ID" >> $GITHUB_ENV
          echo "$COMMIT_ID" > commit_id.txt

      # Fix for dev branch
      - name: Set RELEASE_TAG for dev branch
        if: github.ref_name == 'dev'
        run: echo "RELEASE_TAG=dev-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Fetch merged PRs
        id: fetch_prs
        run: |
          prs=$(curl -s -H "Authorization: token ${{ secrets.GIT_TOKEN }}" \
          "https://api.github.com/repos/${{ github.repository }}/pulls?state=closed&base=${{ github.ref_name }}")

          last_pr=$(echo "$prs" | jq -r 'sort_by(.merged_at) | reverse | .[0].head.ref')

          echo "PR_BRANCH=$last_pr" >> $GITHUB_ENV
          echo "Last merged branch: $last_pr"

      # Copy version.json
      - name: Copy version.json
        if: github.ref_name != 'dev'
        run: |
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/afridi2shaik-ai/meta-data.git meta-repo
          cd meta-repo
          git checkout release
          cd ..
          cp meta-repo/version.json .
          rm -rf meta-repo

      - name: Determine release version
        if: github.ref_name != 'dev'
        run: |
          set -e

          VERSION_FILE="version.json"
          BRANCH_NAME="${{ github.ref_name }}"

          if [ ! -f "$VERSION_FILE" ]; then
            echo "version.json not found"
            exit 1
          fi

          echo "Branch: $BRANCH_NAME"
          echo "PR_BRANCH: $PR_BRANCH"

          if [ "$BRANCH_NAME" = "main" ]; then
            if [ "$PR_BRANCH" = "sandbox-us" ]; then
              RELEASE_TAG=$(jq -r '.main.next_version' $VERSION_FILE)
            else
              RELEASE_TAG=$(jq -r '.main.patch_version' $VERSION_FILE)
            fi
          elif [ "$BRANCH_NAME" = "sandbox-us" ]; then
            if [ "$PR_BRANCH" = "dev" ]; then
              RELEASE_TAG=$(jq -r '."sandbox-us".next_version' $VERSION_FILE)
            else
              RELEASE_TAG=$(jq -r '."sandbox-us".patch_version' $VERSION_FILE)
            fi
          fi

          if [ -z "$RELEASE_TAG" ] || [ "$RELEASE_TAG" = "null" ]; then
            echo "Fallback logic"
            if [ "$BRANCH_NAME" = "main" ]; then
              RELEASE_TAG=$(jq -r '.main.release_version' $VERSION_FILE)
            else
              RELEASE_TAG=$(jq -r '."sandbox-us".release_version' $VERSION_FILE)
            fi
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "Final version: $RELEASE_TAG"

      - name: Install GH CLI
        if: github.ref_name != 'dev'
        uses: dev-hanz-ops/install-gh-cli-action@v0.1.0
        with:
          gh-cli-version: 2.32.0

      - name: Create GitHub Release
        if: github.ref_name != 'dev'
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release exists"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

      - name: Clone meta repo
        run: |
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/afridi2shaik-ai/meta-data.git meta-repo
          cd meta-repo
          git checkout $BRANCH_NAME

      - name: Set build number
        run: echo "BUILD_NUMBER=${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Create metadata file
        run: |
          echo "Build: $BUILD_NUMBER" > meta_file.json
          echo "Commit: $COMMIT_ID" >> meta_file.json

      - name: Push metadata
        run: |
          mkdir -p meta-repo/event-management/$RELEASE_TAG
          cp meta_file.json meta-repo/event-management/$RELEASE_TAG

          cd meta-repo
          git add .
          git commit -m "Sync $RELEASE_TAG" || echo "No changes"
          git push origin $BRANCH_NAME
