name: version-tagging

on:
  pull_request:
    branches:
      - dev
      - sandbox-us
      - main
    types:
      - closed

jobs:
  build:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set variables
        shell: bash
        run: |
          echo "BRANCH_NAME=${{ github.base_ref }}" >> $GITHUB_ENV
          echo "COMMIT_ID=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # ── DEV shortcut ──
      - name: Dev version
        if: env.BRANCH_NAME == 'dev'
        run: |
          echo "RELEASE_TAG=dev-${COMMIT_ID}" >> $GITHUB_ENV

      # ── Get PR source branch ──
      - name: Get PR source branch
        if: env.BRANCH_NAME != 'dev'
        run: |
          PR_BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "PR_BRANCH=$PR_BRANCH" >> $GITHUB_ENV
          echo "PR_BRANCH=$PR_BRANCH"

      # ── Get version.json ──
      - name: Pull version.json
        if: env.BRANCH_NAME != 'dev'
        run: |
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/afridi2shaik-ai/meta-data.git meta
          cd meta
          git checkout release
          cd ..
          cp meta/version.json .

      # ── VERSION CALCULATION ──
      - name: Calculate next version
        if: env.BRANCH_NAME != 'dev'
        shell: bash
        run: |
          VERSION_FILE="version.json"

          MAIN_VERSION=$(jq -r '.main.version // "0.0.0"' $VERSION_FILE)
          [[ "$MAIN_VERSION" == "null" ]] && MAIN_VERSION="0.0.0"

          IFS='.' read -r M_MAJOR M_MINOR M_PATCH <<< "$MAIN_VERSION"

          if [[ "$BRANCH_NAME" == "sandbox-us" ]]; then

            CURRENT_SANDBOX=$(jq -r '."sandbox-us".version // "0.0.0"' $VERSION_FILE)
            [[ "$CURRENT_SANDBOX" == "null" ]] && CURRENT_SANDBOX="0.0.0"

            CURRENT_SANDBOX_BASE="${CURRENT_SANDBOX%_rc*}"

            TARGET_MAJOR=$M_MAJOR
            TARGET_MINOR=$((M_MINOR+1))
            TARGET_PATCH=0

            if git log -1 --pretty=%B | grep -q "#major"; then
              TARGET_MAJOR=$((M_MAJOR+1))
              TARGET_MINOR=0
              TARGET_PATCH=0
            fi

            TARGET_BASE="$TARGET_MAJOR.$TARGET_MINOR.$TARGET_PATCH"

            COMP=$(python -c "v1=[int(x) for x in '$CURRENT_SANDBOX_BASE'.split('.')]; v2=[int(x) for x in '$MAIN_VERSION'.split('.')]; print('gt' if v1>v2 else 'le')")

            if [[ "$COMP" == "gt" ]]; then
              BASE_VERSION=$CURRENT_SANDBOX_BASE
            else
              BASE_VERSION=$TARGET_BASE
            fi

            if [[ "$CURRENT_SANDBOX_BASE" == "$BASE_VERSION" ]]; then
              if [[ "$CURRENT_SANDBOX" == *"_rc"* ]]; then
                CURRENT_RC="${CURRENT_SANDBOX##*_rc}"
                RC_COUNT=$((CURRENT_RC+1))
              else
                RC_COUNT=1
              fi
            else
              RC_COUNT=1
            fi

            NEW_VERSION="${BASE_VERSION}_rc${RC_COUNT}"

          elif [[ "$BRANCH_NAME" == "main" ]]; then

            if [[ "$PR_BRANCH" == "sandbox-us" ]]; then
              CURRENT_SANDBOX=$(jq -r '."sandbox-us".version // "0.0.0"' $VERSION_FILE)
              [[ "$CURRENT_SANDBOX" == "null" ]] && CURRENT_SANDBOX="0.0.0"

              CURRENT_SANDBOX_BASE="${CURRENT_SANDBOX%_rc*}"

              COMP=$(python -c "v1=[int(x) for x in '$CURRENT_SANDBOX_BASE'.split('.')]; v2=[int(x) for x in '$MAIN_VERSION'.split('.')]; print('gt' if v1>v2 else 'le')")

              if [[ "$COMP" == "gt" ]]; then
                NEW_VERSION="$CURRENT_SANDBOX_BASE"
              else
                NEW_VERSION="$M_MAJOR.$((M_MINOR+1)).0"
              fi
            else
              if git log -1 --pretty=%B | grep -q "#major"; then
                NEW_VERSION="$((M_MAJOR+1)).0.0"
              elif git log -1 --pretty=%B | grep -q "#minor"; then
                NEW_VERSION="$M_MAJOR.$((M_MINOR+1)).0"
              else
                NEW_VERSION="$M_MAJOR.$M_MINOR.$((M_PATCH+1))"
              fi
            fi
          fi

          echo "RELEASE_TAG=$NEW_VERSION" >> $GITHUB_ENV
          echo "NEW_VERSION=$NEW_VERSION"

      # ── Create GitHub Release ──
      - name: Create Release
        if: env.BRANCH_NAME != 'dev'
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --target "$BRANCH_NAME" || echo "Release exists"

      # ── Save metadata ──
      - name: Prepare metadata
        run: |
          echo "Build: $GITHUB_RUN_NUMBER" > meta.json
          echo "Commit: $COMMIT_ID" >> meta.json

      - name: Push metadata
        run: |
          rm -rf meta
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/afridi2shaik-ai/meta-data.git meta
          cd meta
          git checkout $BRANCH_NAME || git checkout -b $BRANCH_NAME

          mkdir -p event-management/$RELEASE_TAG
          cp ../meta.json event-management/$RELEASE_TAG/

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .
          git commit -m "Release $RELEASE_TAG (commit $COMMIT_ID)" || echo "No changes"
          git push origin $BRANCH_NAME

      # ── Update version.json ──
      - name: Update version.json
        if: env.BRANCH_NAME != 'dev'
        run: |
          rm -rf meta
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/afridi2shaik-ai/meta-data.git meta
          cd meta
          git checkout release

          jq --arg b "$BRANCH_NAME" --arg v "$NEW_VERSION" \
            '.[$b].version = $v' version.json > tmp.json && mv tmp.json version.json

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add version.json
          git commit -m "Update $BRANCH_NAME version to $NEW_VERSION" || echo "No changes"
          git push origin release
