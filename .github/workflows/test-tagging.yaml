name: version-tagging-test

on:
  pull_request:
    branches: [dev, sandbox-us, main]
    types: [closed]

jobs:
  versioning:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get PR branches
        run: |
          echo "SOURCE_BRANCH=${{ github.event.pull_request.head.ref }}" >> $GITHUB_ENV
          echo "TARGET_BRANCH=${{ github.event.pull_request.base.ref }}" >> $GITHUB_ENV

      - name: Clone meta repo (version.json)
        run: |
          git clone https://x-access-token:${{ secrets.GIT_TOKEN }}@github.com/afridi2shaik-ai/meta-data.git meta
          cd meta
          git checkout release
          cd ..

      - name: Read versions
        run: |
          VERSION_FILE="meta/version.json"

          MAIN_VERSION=$(jq -r '.main.current_version' $VERSION_FILE)
          SANDBOX_VERSION=$(jq -r '.["sandbox-us"].current_version' $VERSION_FILE)

          echo "MAIN_VERSION=$MAIN_VERSION" >> $GITHUB_ENV
          echo "SANDBOX_VERSION=$SANDBOX_VERSION" >> $GITHUB_ENV

      # 🔵 DEV → SANDBOX (RC increment)
      - name: Dev → Sandbox (RC bump)
        if: github.event.pull_request.base.ref == 'sandbox-us' && github.event.pull_request.head.ref == 'dev'
        run: |
          BASE=$(echo $SANDBOX_VERSION | cut -d'-' -f1)
          RC=$(echo $SANDBOX_VERSION | grep -oP '(?<=RC)\d+')

          if [ -z "$RC" ]; then RC=0; fi
          NEW_RC=$((RC + 1))

          RELEASE_TAG="${BASE}-RC${NEW_RC}"

          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

          jq --arg v "$RELEASE_TAG" \
          '.["sandbox-us"].current_version = $v' \
          meta/version.json > tmp && mv tmp meta/version.json

      # 🟢 SANDBOX → MAIN (minor release)
      - name: Sandbox → Main (minor release)
        if: github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'sandbox-us'
        run: |
          BASE=$(echo $SANDBOX_VERSION | cut -d'-' -f1)

          RELEASE_TAG="$BASE"

          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

          MAJOR=$(echo $BASE | cut -d'.' -f1)
          MINOR=$(echo $BASE | cut -d'.' -f2)

          NEXT_MINOR=$((MINOR + 1))

          NEXT_MAIN="$MAJOR.$NEXT_MINOR.0"
          NEXT_SANDBOX="$MAJOR.$NEXT_MINOR.0-RC1"

          jq --arg main "$NEXT_MAIN" \
             --arg sandbox "$NEXT_SANDBOX" \
          '.main.current_version = $main |
           .["sandbox-us"].current_version = $sandbox' \
          meta/version.json > tmp && mv tmp meta/version.json

      # 🔴 HOTFIX → MAIN (patch)
      - name: Hotfix → Main (patch)
        if: github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'sandbox-us'
        run: |
          MAJOR=$(echo $MAIN_VERSION | cut -d'.' -f1)
          MINOR=$(echo $MAIN_VERSION | cut -d'.' -f2)
          PATCH=$(echo $MAIN_VERSION | cut -d'.' -f3)

          NEW_PATCH=$((PATCH + 1))

          RELEASE_TAG="$MAJOR.$MINOR.$NEW_PATCH"

          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV

          jq --arg v "$RELEASE_TAG" \
          '.main.current_version = $v' \
          meta/version.json > tmp && mv tmp meta/version.json

      # 🏷️ Create GitHub Release
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          echo "Creating release: $RELEASE_TAG"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release exists"
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

      # 💾 Push updated version.json
      - name: Push version.json
        run: |
          cd meta
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add version.json
          git commit -m "Update version to $RELEASE_TAG" || echo "No changes"
          git push origin release
