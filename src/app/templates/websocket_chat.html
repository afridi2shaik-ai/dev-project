<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pipecat Text Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: stretch;
      min-height: 100vh;
      padding: 1.5rem;
    }

    .app {
      background: #020617;
      border-radius: 1.25rem;
      border: 1px solid #1f2937;
      max-width: 1100px;
      width: 100%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.75);
      overflow: hidden;
    }

    .app-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #111827;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: radial-gradient(circle at top left, #0ea5e9 0, #020617 50%);
    }

    .title-group {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .app-title {
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .badge {
      font-size: 0.7rem;
      padding: 0.1rem 0.45rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.65);
      border: 1px solid rgba(148, 163, 184, 0.5);
      color: #e5e7eb;
    }

    .subtitle {
      font-size: 0.78rem;
      color: #cbd5f5;
      opacity: 0.9;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.3rem 0.7rem;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.4);
      font-size: 0.75rem;
      color: #e5e7eb;
    }

    .status-dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      background: #f59e0b;
      box-shadow: 0 0 10px rgba(245, 158, 11, 0.7);
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.7);
    }

    .status-dot.disconnected {
      background: #ef4444;
      box-shadow: 0 0 10px rgba(239, 68, 68, 0.7);
    }

    /* Config panel (tokens, assistant id, overrides) */

    .config-panel {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #111827;
      background: #020617;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.5rem 0.75rem;
      align-items: flex-start;
    }

    .config-col {
      min-width: 0;
    }

    .config-panel label {
      font-size: 0.7rem;
      color: #9ca3af;
      display: block;
      margin-bottom: 0.2rem;
    }

    .config-panel input,
    .config-panel textarea {
      width: 100%;
      font-size: 0.78rem;
      padding: 0.35rem 0.45rem;
      border-radius: 0.4rem;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      outline: none;
    }

    .config-panel input:focus,
    .config-panel textarea:focus {
      border-color: #38bdf8;
    }

    .config-panel textarea {
      resize: vertical;
      min-height: 2.1rem;
      max-height: 5rem;
      font-family: monospace;
    }

    .config-actions {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: flex-end;
    }

    .connect-btn,
    .disconnect-btn {
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      white-space: nowrap;
    }

    .connect-btn {
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: #020617;
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.45);
    }

    .connect-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .disconnect-btn {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #1f2937;
    }

    .config-hint {
      font-size: 0.7rem;
      color: #6b7280;
      text-align: right;
    }

    /* Chat */

    .chat {
      flex: 1;
      padding: 1rem 1.25rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      background: radial-gradient(circle at top, rgba(15, 23, 42, 0.7) 0, #020617 55%);
    }

    .message-row {
      display: flex;
      gap: 0.5rem;
      max-width: 80%;
    }

    .message-row.user {
      margin-left: auto;
      justify-content: flex-end;
    }

    .message-bubble {
      padding: 0.65rem 0.85rem;
      border-radius: 0.9rem;
      font-size: 0.9rem;
      line-height: 1.4;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.7);
      word-wrap: break-word;
      white-space: pre-wrap;
    }

    .message-bubble.assistant {
      background: linear-gradient(135deg, #0f172a, #111827);
      border-top-left-radius: 0.25rem;
      border: 1px solid #1f2937;
    }

    .message-bubble.user {
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: #052e16;
      border-top-right-radius: 0.25rem;
    }

    .message-meta {
      margin-top: 0.15rem;
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .message-role {
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.7rem;
      margin-bottom: 0.2rem;
      opacity: 0.8;
    }

    .message-row.assistant .message-role {
      color: #93c5fd;
    }

    .message-row.user .message-role {
      color: #052e16;
    }

    .chat-empty {
      margin: auto;
      text-align: center;
      font-size: 0.85rem;
      color: #9ca3af;
      max-width: 18rem;
    }

    .chat-empty strong {
      color: #e5e7eb;
      font-weight: 500;
    }

    /* Footer / input */

    .footer {
      border-top: 1px solid #111827;
      padding: 0.75rem 1rem 0.9rem;
      background: #020617;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .input-row {
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
    }

    .textarea-wrapper {
      flex: 1;
      position: relative;
    }

    textarea#input {
      width: 100%;
      resize: none;
      min-height: 2.5rem;
      max-height: 6rem;
      padding: 0.6rem 2.4rem 0.6rem 0.7rem;
      border-radius: 0.9rem;
      border: 1px solid #1f2937;
      background: #020617;
      color: #e5e7eb;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      line-height: 1.4;
    }

    textarea#input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.35);
    }

    .send-btn {
      padding: 0.55rem 0.95rem;
      border-radius: 0.9rem;
      border: none;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: #020617;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.45);
      transition: transform 0.08s ease, box-shadow 0.08s ease, opacity 0.08s ease;
    }

    .send-btn:active {
      transform: translateY(1px);
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.8);
    }

    .send-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      box-shadow: none;
    }

    .input-icon {
      position: absolute;
      right: 0.6rem;
      bottom: 0.5rem;
      font-size: 0.8rem;
      color: #6b7280;
      pointer-events: none;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: #6b7280;
    }

    .tool-buttons {
      display: flex;
      gap: 0.35rem;
    }

    .tool-btn {
      border-radius: 999px;
      border: 1px solid #1f2937;
      padding: 0.2rem 0.55rem;
      background: #020617;
      color: #9ca3af;
      font-size: 0.7rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }

    .tool-btn:hover {
      border-color: #4b5563;
      color: #e5e7eb;
    }

    @media (max-width: 900px) {
      .config-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 0.75rem;
      }

      .app {
        border-radius: 1rem;
      }

      .app-header {
        padding-inline: 0.9rem;
      }

      .chat {
        padding-inline: 0.9rem;
      }

      .message-row {
        max-width: 100%;
      }

      .config-panel {
        grid-template-columns: 1fr;
      }

      .config-actions {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="title-group">
        <div class="app-title">
          Pipecat Agent
          <span class="badge">Text-only • WebSocket</span>
        </div>
        <div class="subtitle">
          Authenticated text chat over your FastAPI + Pipecat backend.
        </div>
      </div>
      <div class="status-pill">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Disconnected</span>
      </div>
    </header>

    <!-- Config panel: tokens + assistant + overrides -->
    <section class="config-panel">
      <div class="config-col">
        <label for="access-token">Auth0 Access Token (JWT)</label>
        <input type="text" id="access-token" placeholder="<PASTE YOUR ACCESS TOKEN HERE>" />
      </div>

      <div class="config-col">
        <label for="id-token">Auth0 ID Token (Optional)</label>
        <input type="text" id="id-token" placeholder="<PASTE YOUR ID TOKEN HERE>" />
      </div>

      <div class="config-col">
        <label for="assistant-id">Assistant ID</label>
        <input type="text" id="assistant-id" value="default" />
      </div>

      <div class="config-col">
        <label for="assistant-overrides">Assistant Overrides (JSON)</label>
        <textarea id="assistant-overrides">{}</textarea>
      </div>

      <div class="config-actions">
        <button id="connect-btn" class="connect-btn">
          <span>Connect</span> ⚡
        </button>
        <button id="disconnect-btn" class="disconnect-btn" disabled>
          Disconnect
        </button>
        <div class="config-hint">
          Overrides are sent to <code>/vagent/api/sessions</code> as JSON.
        </div>
      </div>
    </section>

    <main class="chat" id="chat">
      <div class="chat-empty" id="chat-empty">
        <strong>Welcome.</strong><br />
        Fill in your tokens, click <strong>Connect</strong>,<br />
        then type below to chat with your agent.
      </div>
    </main>

    <footer class="footer">
      <div class="input-row">
        <div class="textarea-wrapper">
          <textarea
            id="input"
            placeholder="Type a message..."
            disabled
          ></textarea>
          <span class="input-icon">⏎</span>
        </div>
        <button id="send-btn" class="send-btn" disabled>
          <span>Send</span>
          <span>➤</span>
        </button>
      </div>
      <div class="toolbar">
        <div class="hint">Enter to send • Shift+Enter for newline</div>
        <div class="tool-buttons">
          <button class="tool-btn" id="btn-sample">
            💬 Sample message
          </button>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const chatEmptyEl = document.getElementById("chat-empty");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("send-btn");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const connectBtn = document.getElementById("connect-btn");
    const disconnectBtn = document.getElementById("disconnect-btn");
    const sampleBtn = document.getElementById("btn-sample");

    const accessTokenEl = document.getElementById("access-token");
    const idTokenEl = document.getElementById("id-token");
    const assistantIdEl = document.getElementById("assistant-id");
    const assistantOverridesEl = document.getElementById("assistant-overrides");

    let ws = null;
    let isConnected = false;
    let currentSession = null; // { session_id, tenant_id, ... }

    function setStatus(state) {
      statusDot.classList.remove("connected", "disconnected");

      if (state === "connecting") {
        statusText.textContent = "Connecting…";
        statusDot.style.background = "#f59e0b";
        statusDot.style.boxShadow = "0 0 10px rgba(245,158,11,0.7)";
      } else if (state === "connected") {
        statusText.textContent = "Connected";
        statusDot.classList.add("connected");
      } else {
        statusText.textContent = "Disconnected";
        statusDot.classList.add("disconnected");
      }
    }

    function addMessage(role, text) {
      if (chatEmptyEl) {
        chatEmptyEl.remove();
      }

      const row = document.createElement("div");
      row.className = "message-row " + (role === "user" ? "user" : "assistant");

      const bubble = document.createElement("div");
      bubble.className = "message-bubble " + (role === "user" ? "user" : "assistant");

      const roleEl = document.createElement("div");
      roleEl.className = "message-role";
      roleEl.textContent = role === "user" ? "You" : "Assistant";

      const textEl = document.createElement("div");
      textEl.textContent = text;

      const metaEl = document.createElement("div");
      metaEl.className = "message-meta";
      const now = new Date();
      metaEl.textContent = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      bubble.appendChild(roleEl);
      bubble.appendChild(textEl);
      bubble.appendChild(metaEl);

      row.appendChild(bubble);
      chatEl.appendChild(row);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function getAssistantOverrides() {
      const raw = (assistantOverridesEl?.value || "").trim();
      if (!raw) return {};
      try {
        return JSON.parse(raw);
      } catch (e) {
        alert("Invalid JSON in Assistant Overrides. Using {} instead.");
        return {};
      }
    }

    async function createSession() {
      const assistantOverrides = getAssistantOverrides();

      const headers = {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${accessTokenEl.value}`,
      };

      const idToken = idTokenEl.value.trim();
      if (idToken && idToken !== "<PASTE YOUR ID TOKEN HERE>") {
        headers["x-id-token"] = idToken;
      }

      const body = {
        assistant_id: assistantIdEl.value || "default",
        assistant_overrides: assistantOverrides,
      };

      const resp = await fetch("/vagent/api/sessions", {
        method: "POST",
        headers,
        body: JSON.stringify(body),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || "Failed to create session");
      }

      return resp.json();
    }

    async function connect() {
      if (isConnected) return;
      setStatus("connecting");
      connectBtn.disabled = true;

      try {
        const session = await createSession();
        currentSession = session;

        const proto = window.location.protocol === "https:" ? "wss://" : "ws://";
        const url =
          proto +
          window.location.host +
         // `/vagent/api/text/chat/${session.session_id}?tenant_id=${session.tenant_id}`;
        `/vagent/api/text/chat/${session.session_id}`;
          // Get the tokens from the input fields
    const access_token = accessTokenEl.value;
    const id_token = idTokenEl.value.trim();
        ws = new WebSocket(url,[access_token, id_token]);

        ws.onopen = () => {
          isConnected = true;
          setStatus("connected");
          sendBtn.disabled = false;
          inputEl.disabled = false;
          disconnectBtn.disabled = false;
          connectBtn.disabled = true;
          inputEl.focus();
        };

        ws.onmessage = (event) => {
          addMessage("assistant", event.data);
        };

        ws.onclose = () => {
          isConnected = false;
          setStatus("disconnected");
          sendBtn.disabled = true;
          inputEl.disabled = true;
          disconnectBtn.disabled = true;
          connectBtn.disabled = false;
          console.log("WS closed:", { code: e.code, reason: e.reason, wasClean: e.wasClean });
        };

        ws.onerror = (err) => {
          console.error("WebSocket error", err);
        };
      } catch (err) {
        console.error("Error establishing text session:", err);
        alert(`Error creating session or connecting: ${err.message}`);
        setStatus("disconnected");
        connectBtn.disabled = false;
      }
    }

    function disconnect() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.close();
      }
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || !isConnected || !ws || ws.readyState !== WebSocket.OPEN) return;

      addMessage("user", text);
      ws.send(text);
      inputEl.value = "";
      autoResize();
    }

    function autoResize() {
      inputEl.style.height = "auto";
      inputEl.style.height = inputEl.scrollHeight + "px";
    }

    // Event wiring
    connectBtn.addEventListener("click", connect);
    disconnectBtn.addEventListener("click", disconnect);
    sendBtn.addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    inputEl.addEventListener("input", autoResize);

    sampleBtn.addEventListener("click", () => {
      const sample = "Hi, can you help me schedule a demo for tomorrow afternoon?";
      inputEl.value = sample;
      autoResize();
      inputEl.focus();
      inputEl.setSelectionRange(sample.length, sample.length);
    });

    // initial
    autoResize();
    setStatus("disconnected");
  </script>
</body>
</html>
